<!DOCTYPE html>
<html>

<head>
    <title>Basic HTML Form</title>
</head>

<body>

    <h2>Contact Us</h2>

    <form action="/submit_endpoint" method="POST">

        <label for="user_name">Full Name:</label><br>
        <input type="text" id="user_name" name="user_name" required><br><br>

        <label for="user_email">Email Address:</label><br>
        <input type="email" id="user_email" name="user_email" required><br><br>

        <label for="user_message">Message:</label><br>
        <textarea id="user_message" name="user_message" rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Submit">

    </form>

</body>

</html>
